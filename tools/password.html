<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>パスワード生成 - PocketTools</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<header>

<h1>🔐 パスワード生成</h1>

<p>
安全なパスワードを作成
</p>

</header>



<main>


<div class="card">


<h2>
生成する長さ
</h2>


<input
id="length"
type="number"
value="12"
min="4"
max="50"
style="
width:100%;
padding:12px;
border-radius:10px;
font-size:16px;
">



<button
onclick="createPassword()"
style="
width:100%;
padding:15px;
margin-top:15px;
border-radius:15px;
border:none;
cursor:pointer;
">

作成する

</button>



<h2 id="result">

-

</h2>



<a href="../index.html" class="card">

🏠 ホームへ戻る

</a>


</div>


</main>



<script>


function createPassword(){


let chars =
"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";


let length =
Number(document.getElementById("length").value);



let password="";


for(let i=0;i<length;i++){

password +=
chars[Math.floor(Math.random()*chars.length)];

}



document.getElementById("result")
.innerText=password;


}


</script>



</body>

</html>
